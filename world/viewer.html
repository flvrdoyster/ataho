<!DOCTYPE html>
<html>

<head>
    <title>Map Viewer</title>
    <style>
        body {
            background: #000;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #000;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <div id="loading" style="color: white; position: absolute; top: 10px; left: 10px;">Loading...</div>
    <script>
        // Parse URL parameter for map name
        const urlParams = new URLSearchParams(window.location.search);
        const mapName = urlParams.get('map') || 'cave';

        // Set engine path base (viewer is in world/, paths are world-relative)
        window.MAP_NAME = mapName;
        window.MAP_BASE = '';

        // Dynamic Script Loader
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        (async function () {
            try {
                await loadScript(`maps/${mapName}/data.js`);
                document.getElementById('loading').style.display = 'none';
                try { await loadScript(`maps/${mapName}/triggers.js`); }
                catch (e) { console.warn("triggers.js not found, continuing."); }
                await loadScript('engine.js');
                await loadScript('char/char_free.js');
                initGame();
            } catch (e) {
                document.getElementById('loading').innerText = `Error: Map '${mapName}' not found.`;
            }
        })();
    </script>
</body>

</html>
