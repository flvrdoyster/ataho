<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://atah.io/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload"
        href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/KoddiUDOnGothic-Regular.woff" as="font"
        type="font/woff" crossorigin>
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="footer.css">
    <title>페이지를 찾을 수 없습니다 : atah.io</title>
    <style>
        body {
            background: rgba(0, 0, 0, 1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #notfound {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        #notfound h1 {
            margin: 0;
            font-size: 5rem;
            color: rgba(238, 238, 238, 1);
        }

        #notfound p {
            margin: 10px 0 0;
            color: rgba(187, 187, 187, 1);
        }

        #notfound a {
            display: inline-block;
            margin-top: 24px;
        }

        /* 환세쾌진극 엔딩(scene_viewer/kaisin)의 등롱/꼬리 스프라이트만 빌려온 장식.
           원본은 320x224 기준으로 그려진 이미지라 그대로 원본 크기 유지 (확대 안 함). */
        #gameover-sprite {
            position: relative;
            width: 320px;
            height: 224px;
            margin-top: 24px;
        }

        #gameover-sprite img.bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #gameover-sprite .sprite {
            position: absolute;
            image-rendering: pixelated;
            background-repeat: no-repeat;
        }

        #gameover-sprite .tail {
            top: 124px;
            left: 160px;
            width: 32px;
            height: 48px;
            background-image: url('scene_viewer/kaisin/staffroll_sp1.png');
            background-size: 512px 48px;
            animation: gameover-tail-anim 2.667s steps(16) infinite;
        }

        #gameover-sprite .lantern {
            top: 80px;
            left: 42px;
            width: 30px;
            height: 32px;
            background-image: url('scene_viewer/kaisin/staffroll_sp2.png');
            background-size: 120px 32px;
            animation: gameover-lantern-anim 2s steps(4) infinite;
        }

        @keyframes gameover-tail-anim {
            from { background-position: 0 0; }
            to { background-position: -512px 0; }
        }

        @keyframes gameover-lantern-anim {
            from { background-position: 0 0; }
            to { background-position: -120px 0; }
        }
    </style>
</head>

<body class="footer-static">
    <div id="notfound">
        <h1>404</h1>
        <p>여기가 아니었나...</p>
        <div id="gameover-sprite">
            <img class="bg" src="scene_viewer/kaisin/staffroll.png" alt="">
            <div class="sprite tail"></div>
            <div class="sprite lantern"></div>
        </div>
        <a href="/">돌아가기</a>
    </div>
</body>
<script src="footer.js"></script>

</html>
