<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장면 뷰어 : atah.io</title>
    <link rel="icon" href="https://atah.io/favicon.ico">
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="scene_viewer.css">
    <!-- Google Tag Manager -->
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-PR4S897C');</script>
    <!-- End Google Tag Manager -->
    <link rel="stylesheet" href="../footer.css">
</head>

<body class="footer-fixed">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PR4S897C" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="app">
        <div id="stage" class="stage">
            <!-- Scene content will be injected here -->
            <div id="loading">Loading...</div>
        </div>
        <div id="controls">
            <input type="range" id="scene-scrubber" min="0" max="0" value="0" style="width: 100%;">

        </div>
    </div>

    <!-- Scripts -->
    <script src="scene_viewer.js"></script>
    <script>
        const STORY_MAP = {
            kaisin: { script: 'kaisin/kaisin.js', css: 'kaisin/kaisin.css' },
            gaiden: { script: 'gaiden/gaiden.js', css: 'gaiden/gaiden.css' },
            ani:    { script: 'ani/ani.js', css: 'ani/ani.css' },
        };

        const storyId = new URLSearchParams(location.search).get('story') || 'kaisin';
        const entry = STORY_MAP[storyId];

        if (!entry) {
            document.getElementById('loading').textContent = `스토리를 찾을 수 없습니다: ${storyId}`;
        } else {
            if (entry.css) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = entry.css;
                document.head.appendChild(link);
            }

            const script = document.createElement('script');
            script.src = entry.script;
            script.onload = () => {
                const story = SceneViewer.stories[storyId];
                if (!story) {
                    console.error(`Story registered but not found: ${storyId}`);
                    return;
                }
                const viewer = new SceneViewer('#stage');
                viewer.loadStory(story);
            };
            document.head.appendChild(script);
        }
    </script>
    <script src="../footer.js"></script>
</body>

</html>
